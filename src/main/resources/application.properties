spring.application.name=ecommerce

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# Performance Optimizations
spring.jpa.properties.hibernate.default_batch_fetch_size=100


# Upstash Redis REST Configuration
UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:}
UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:}

jwt.secret=${JWT_SECRET}
jwt.expiration=2592000000

# Google OAuth2 Settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=https://api.lemonhousecraft.in/login/oauth2/code/google
# Frontend Redirect Settings
app.frontend.url=${FRONTEND_URL:https://lemonhousecraft.in}

# Cloudinary Credentials
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}


# Zoepact API Settings
zoepact.api.template-url=${ZOEPACT_API_URL}
zoepact.api.token=${ZOEPACT_API_TOKEN}
zoepact.phone-number-id=${ZOEPACT_PHONE_NUMBER_ID}
zoepact.template-id=${ZOEPACT_TEMPLATE_ID}
# Proxy Headers Configuration
server.forward-headers-strategy=FRAMEWORK

# iCarry Shipping API Configuration
icarry.base-url=<ICARRY_BASE_URL>
icarry.username=<ICARRY_USERNAME>
icarry.api-key=${ICARRY_API_KEY}
icarry.origin-pincode=${ICARRY_ORIGIN_PINCODE:284003}

icarry.shipment-webhook=https://api.lemonhousecraft.in/api/webhooks/icarry/shipment-status
icarry.ndr-webhook=https://api.lemonhousecraft.in/api/webhooks/icarry/ndr
icarry.weight-webhook=https://api.lemonhousecraft.in/api/webhooks/icarry/weight-dispute

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
