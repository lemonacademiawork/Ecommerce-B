spring.application.name=ecommerce

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# # Google OAuth2 Settings
# google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}
# google.client-secret=${GOOGLE_CLIENT_SECRET}
# google.redirect-uri=http://localhost:8080/api/auth/google/callback

# Cloudinary Credentials
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
# Zoepact API Settings
zoepact.api.template-url=https://app.zoepact.in/api/v1/whatsapp/send/template
zoepact.api.token=${ZOEPACT_API_TOKEN}
zoepact.phone-number-id=${ZOEPACT_PHONE_NUMBER_ID}
zoepact.template-id=${ZOEPACT_TEMPLATE_ID}


