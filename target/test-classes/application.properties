# Disable auto-configuration that requires real connections
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT settings for tests
jwt.secret=my-super-secret-key-for-development-only-123456789
jwt.expiration=86400000

# Cloudinary stub
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-api-key
cloudinary.api-secret=test-api-secret

# Zoepact stub
zoepact.api.template-url=https://stub.zoepact.test/send
zoepact.api.token=stub-token
zoepact.phone-number-id=stub-phone-id
zoepact.template-id=stub-template-id

# Google OAuth stub
google.client-id=stub-google-client-id
